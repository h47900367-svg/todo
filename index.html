<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productive To-Do</title>

<style>

:root{
--bg:#f4f7fb;
--card:#ffffff;
--text:#222;
--accent:#4CAF50;
}

body.dark{
--bg:#1e1e1e;
--card:#2c2c2c;
--text:#eee;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.app{
background:var(--card);
padding:25px;
border-radius:12px;
width:380px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:5px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
cursor:pointer;
border:none;
padding:8px 10px;
border-radius:6px;
}

.dark-btn{
background:#333;
color:white;
}

.input-box{
display:flex;
margin-top:15px;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.time{
width:110px;
}

.add{
background:var(--accent);
color:white;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
max-height:220px;
overflow:auto;
}

li{
background:#ececec;
margin-bottom:10px;
padding:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

body.dark li{
background:#3a3a3a;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.progress{
margin-top:10px;
background:#ddd;
height:8px;
border-radius:10px;
}

.bar{
height:8px;
background:var(--accent);
border-radius:10px;
width:0%;
}

.streak{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.delete{
background:red;
color:white;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
<h1>To-Do</h1>
<button class="dark-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="input-box">
<input id="taskInput" placeholder="New task">
<input type="time" id="reminderTime" class="time">
<button class="add" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="streak">
🔥 Daily Streak: <span id="streak">0</span> days
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []
let streak = localStorage.getItem("streak") || 0
let lastDate = localStorage.getItem("lastDate")

document.getElementById("streak").innerText = streak

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function render(){

let list=document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

let li=document.createElement("li")

li.innerHTML=`
<span onclick="toggle(${index})" class="${task.done?'completed':''}">
${task.text}
</span>
<button class="delete" onclick="removeTask(${index})">X</button>
`

list.appendChild(li)

})

updateProgress()
save()
}

function addTask(){

let text=document.getElementById("taskInput").value
let time=document.getElementById("reminderTime").value

if(!text)return

tasks.push({
text:text,
done:false,
time:time
})

document.getElementById("taskInput").value=""

render()
}

function toggle(i){

tasks[i].done=!tasks[i].done
render()
checkStreak()

}

function removeTask(i){

tasks.splice(i,1)
render()

}

function updateProgress(){

let done=tasks.filter(t=>t.done).length
let percent=(done/tasks.length)*100 || 0

document.getElementById("progressBar").style.width=percent+"%"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function checkStreak(){

let today=new Date().toDateString()

if(lastDate!=today){

streak++
localStorage.setItem("streak",streak)
localStorage.setItem("lastDate",today)

document.getElementById("streak").innerText=streak

}

}

function checkReminders(){

let now=new Date()
let current=now.getHours()+":"+String(now.getMinutes()).padStart(2,"0")

tasks.forEach(task=>{

if(task.time===current && !task.done){

if(Notification.permission==="granted"){

new Notification("Reminder",{
body:task.text
})

}

}

})

}

if(Notification.permission!=="granted"){
Notification.requestPermission()
}

setInterval(checkReminders,60000)

render()

</script>

</body>
</html>
